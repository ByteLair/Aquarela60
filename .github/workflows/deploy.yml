name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  APP_NAME: ${{ vars.APP_NAME || 'aquarela60' }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar .env de produção
        run: |
          cat > .env << EOF
          APP_NAME=${{ env.APP_NAME }}
          EOF

      - name: Build da imagem
        run: docker build -t ${{ env.APP_NAME }}:latest .

      - name: Parar containers antigos
        run: docker compose down --remove-orphans || true

      - name: Subir containers
        run: docker compose up -d

      - name: Aguardar app estar saudável
        run: |
          echo "Aguardando app iniciar..."
          for i in $(seq 1 12); do
            if docker exec ${{ env.APP_NAME }}-app node -e "fetch('http://localhost:3003/api/health').then(r=>{if(r.ok)process.exit(0);process.exit(1)}).catch(()=>process.exit(1))" 2>/dev/null; then
              echo "App saudável!"
              exit 0
            fi
            echo "Tentativa $i/12..."
            sleep 5
          done
          echo "App não ficou saudável a tempo."
          docker compose logs app
          exit 1

      - name: Limpar imagens e build cache
        if: always()
        run: |
          docker image prune -f
          docker builder prune -f --filter "until=72h"
