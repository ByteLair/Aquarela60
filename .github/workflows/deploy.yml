name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  APP_NAME: ${{ vars.APP_NAME || 'aquarela60' }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar .env de produção
        run: |
          cat > .env << EOF
          APP_NAME=${{ env.APP_NAME }}
          CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          EOF

      - name: Build da imagem
        run: docker build -t ${{ env.APP_NAME }}:latest .

      - name: Parar containers antigos
        run: docker compose down --remove-orphans || true

      - name: Subir containers
        run: docker compose up -d

      - name: Aguardar app estar saudável
        run: |
          echo "Aguardando app iniciar..."
          for i in $(seq 1 12); do
            if docker exec ${{ env.APP_NAME }}-app wget -qO- http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App saudável!"
              exit 0
            fi
            echo "Tentativa $i/12..."
            sleep 5
          done
          echo "App não ficou saudável a tempo."
          docker compose logs app
          exit 1

      - name: Limpar imagens antigas
        run: docker image prune -f
