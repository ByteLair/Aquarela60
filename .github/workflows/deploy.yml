name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bytelair/aquarela60

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bytelair/aquarela60:latest
            ghcr.io/bytelair/aquarela60:${{ github.sha }}

      - name: Deploy no Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          kubectl set image deployment/aquarela60 aquarela60=ghcr.io/bytelair/aquarela60:${{ github.sha }}
          kubectl rollout status deployment/aquarela60 --timeout=120s

      - name: Limpar imagens antigas
        if: always()
        run: docker image prune -a -f --filter "until=24h"