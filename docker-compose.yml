services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-nextjs-app}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME:-nextjs-app}-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${APP_NAME:-nextjs-app}-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - internal

networks:
  internal:
    driver: bridge
