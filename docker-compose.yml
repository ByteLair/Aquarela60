services:
  app:
    build: .
    container_name: ${APP_NAME:-aquarela60}-app
    restart: unless-stopped
    environment:
      - PORT=3003
      - HOSTNAME=0.0.0.0
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME:-aquarela60}-nginx
    restart: unless-stopped
    ports:
      - "3003:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - internal


networks:
  internal:
    driver: bridge
