services:
  app:
    build: .
    container_name: ${APP_NAME:-aquarela60}-app
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME:-aquarela60}-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${APP_NAME:-aquarela60}-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - internal

networks:
  internal:
    driver: bridge
