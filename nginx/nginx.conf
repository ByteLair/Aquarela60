events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    upstream nextjs_app {
        server app:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers (Cloudflare Tunnel termina SSL, mas manter aqui também)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Bloquear acesso direto sem header do Cloudflare (opcional, recomendado)
        # Descomentar e ajustar se quiser restringir acesso apenas via Tunnel
        # if ($http_cf_visitor = "") {
        #     return 403;
        # }

        location / {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            proxy_buffering    off;
            proxy_read_timeout 60s;
        }

        # Cache de assets estáticos do Next.js
        location /_next/static/ {
            proxy_pass http://nextjs_app;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
